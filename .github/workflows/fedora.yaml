name: Build (fedora)

on:
    workflow_dispatch:
        inputs:
            version:
                description: 'Enter a tagged OGC kernel version in the format <kernel-version>-ogc<rev>'
                required: true
    push:
        tags:
            - 'v*'

env:
    OCI_REPO: ghcr.io/${{ github.repository }}-fedora

permissions:
    contents: read
    packages: write
    id-token: write
    attestations: write

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build-rpm:
        runs-on: ubuntu-latest

        container:
            image: fedora:latest
            volumes:
                - /usr:/usr-host
                - /opt:/opt-host
            options: --privileged

        steps:
            - name: Prepare environment
              shell: bash
              run: |
                # Lowercase the image uri
                echo "OCI_REPO=${OCI_REPO,,}" >> ${GITHUB_ENV}

            - name: Maximize build space
              run: |
                  df -h
                  rm -rf /usr-host/share/dotnet
                  rm -rf /usr-host/share/swift
                  rm -rf /usr-host/share/java
                  rm -rf /usr-host/local/lib/android
                  rm -rf /opt-host/ghc
                  rm -rf /opt-host/hostedtoolcache
                  rm -rf /opt-host/az
                  df -h

            - name: Checkout sources
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  persist-credentials: false

            - name: Dependencies
              run: |
                  dnf -y builddep fedora/kernel.spec
                  dnf -y install jq sed wget

            - name: Get version
              id: version
              shell: bash
              run: |
                  if [ -n "${{ github.event.inputs.version }}" ]; then
                    OGC_VERSION="${{ github.event.inputs.version }}"
                  else
                    TAG="${{ github.ref_name }}"
                    OGC_VERSION="${TAG#v}"
                  fi
                  KERNEL_VERSION="${OGC_VERSION%-ogc*}"
                  MAJOR_VERSION="${KERNEL_VERSION%%.*}.x"
                  echo "ogc_version=$OGC_VERSION" >> "$GITHUB_OUTPUT"
                  echo "kernel_version=$KERNEL_VERSION" >> "$GITHUB_OUTPUT"
                  echo "major_version=$MAJOR_VERSION" >> "$GITHUB_OUTPUT"

            - name: Download and extract kernel source
              shell: bash
              run: |
                  KERNEL_VERSION="${{ steps.version.outputs.kernel_version }}"
                  MAJOR_VERSION="${{ steps.version.outputs.major_version }}"
                  OGC_VERSION="${{ steps.version.outputs.ogc_version }}"
                  wget https://cdn.kernel.org/pub/linux/kernel/v${MAJOR_VERSION}/linux-${KERNEL_VERSION}.tar.xz
                  wget https://github.com/OpenGamingCollective/linux/releases/download/v${OGC_VERSION}/monolithic.patch
                  tar -xf linux-${KERNEL_VERSION}.tar.xz
                  cd linux-${KERNEL_VERSION}
                  patch -Np1 < ../monolithic.patch

            - name: Generate default config
              shell: bash
              run: |
                  cd linux-${{ steps.version.outputs.kernel_version }}
                  make defconfig

            - name: Configure kernel
              uses: OpenGamingCollective/kernel-configurator@5b4abc58a2edf89941180dbbe33b26415db23b0b # v1.0.1
              with:
                  config: linux-${{ steps.version.outputs.kernel_version }}/.config
                  set: |
                      global.config.set
                      fedora/config.set
                  unset: |
                      global.config.unset
                      fedora/config.unset

            - name: Build
              run: |
                  KERNEL_VERSION="${{ steps.version.outputs.kernel_version }}"
                  TOPDIR="$(pwd)/rpmbuild"
                  mkdir -p "$TOPDIR"/{BUILD,BUILDROOT,RPMS,SOURCES,SPECS,SRPMS}
                  # Pre-populate SOURCES with already-downloaded files
                  cp linux-${KERNEL_VERSION}.tar.xz "$TOPDIR/SOURCES/"
                  cp monolithic.patch "$TOPDIR/SOURCES/"
                  cp fedora/kvm_stat.logrotate "$TOPDIR/SOURCES/"
                  # Copy patched config
                  cp linux-${KERNEL_VERSION}/.config "$TOPDIR/SOURCES/config"
                  rpmbuild --define "_topdir $TOPDIR" -ba ./fedora/kernel.spec

            - name: Setup ORAS
              if: startsWith(github.ref, 'refs/tags/')
              uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1

            - name: Setup Cosign
              if: startsWith(github.ref, 'refs/tags/')
              uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0

            - name: Login to ghcr.io
              if: startsWith(github.ref, 'refs/tags/')
              run: |
                  echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u ${{ github.actor }} --password-stdin

            - name: Push OCI artifact
              if: startsWith(github.ref, 'refs/tags/')
              id: push
              run: |
                  VERSION="${{ steps.version.outputs.ogc_version }}"
                  REPO="${{ env.OCI_REPO }}"
                  TOPDIR="$(pwd)/rpmbuild"
                  mkdir -p /tmp/rpms
                  cp "$TOPDIR"/RPMS/x86_64/*.rpm /tmp/rpms/ 2>/dev/null || true
                  cp "$TOPDIR"/RPMS/noarch/*.rpm /tmp/rpms/ 2>/dev/null || true
                  cd /tmp/rpms
                  DIGEST=$(oras push --format json "${REPO}:${VERSION}" ./*.rpm | jq -r '.digest')
                  if [ -z "$DIGEST" ]; then
                      echo "::error::Failed to capture digest from oras push"
                      exit 1
                  fi
                  oras tag "${REPO}:${VERSION}" latest
                  echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

            - name: Attest build provenance
              if: startsWith(github.ref, 'refs/tags/')
              uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
              with:
                  subject-name: ${{ env.OCI_REPO }}
                  subject-digest: ${{ steps.push.outputs.digest }}
                  push-to-registry: true

            - name: Sign artifacts
              if: startsWith(github.ref, 'refs/tags/')
              run: |
                  VERSION="${{ steps.version.outputs.ogc_version }}"
                  REPO="${{ env.OCI_REPO }}"
                  cosign sign --yes "${REPO}:${VERSION}"
                  cosign sign --yes "${REPO}:latest"

            - name: Verify signature
              if: startsWith(github.ref, 'refs/tags/')
              run: |
                  VERSION="${{ steps.version.outputs.ogc_version }}"
                  REPO="${{ env.OCI_REPO }}"
                  cosign verify \
                    --certificate-identity-regexp=".*" \
                    --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
                    "${REPO}:${VERSION}"
